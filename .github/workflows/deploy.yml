name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []   # No dependency - deploy runs independently; add "needs: [test-backend, test-frontend]" if CI is in same workflow
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/stock-theme-app || (git clone https://github.com/${{ github.repository }} /opt/stock-theme-app && cd /opt/stock-theme-app)
            git fetch origin main
            git reset --hard origin/main

            # Write env file
            cat > .env << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            ENVEOF

            # Build and restart
            docker compose pull || true
            docker compose build --no-cache
            docker compose up -d --remove-orphans

            # Health check
            sleep 10
            curl -f http://localhost/api/health || (docker compose logs && exit 1)
            echo "✅ Deployment successful"
