services:
  - type: web
    name: stock-theme-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false   # Render 대시보드 → Environment에서 직접 입력
      - key: SUPABASE_KEY
        sync: false   # service_role 키 입력
      - key: ALLOWED_ORIGINS
        sync: false   # Vercel 배포 URL (e.g. https://your-app.vercel.app)
